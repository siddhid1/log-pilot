services:
  redis:
    image: redis:7.0.11-alpine
    container_name: log-pilot-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-logpilot}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass logpilot --appendonly yes --maxmemory-policy allkeys-lru  
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-logpilot}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    # driver: local